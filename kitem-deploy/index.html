<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;letter-spacing:-0.01em;}
button,input,select{font-family:inherit;letter-spacing:-0.01em;}

/* 가독성: 숫자는 등폭 정렬(표·게이지 % 정렬) */
body{font-feature-settings:"tnum" 1, "kern" 1;text-rendering:optimizeLegibility;}
/* 문단 기본 줄간격 넉넉하게 */
p{line-height:1.7;}
/* 큰 숫자·강조 텍스트 자간 살짝 좁게 (또렷하게) */
h1,h2{letter-spacing:-0.03em;word-break:keep-all;line-height:1.35;}
/* 한글 줄바꿈: 단어 단위로 (어절 중간에서 안 끊기게) */
p,span,div,td,th,li{word-break:keep-all;}

/* 토스풍 인터랙션 */
button{transition:transform .12s ease, box-shadow .12s ease, background .15s ease, border-color .15s ease;}
button:not(:disabled):active{transform:scale(0.97);}
button:not(:disabled):hover{filter:brightness(0.98);}
input,select{transition:border-color .15s ease, box-shadow .15s ease;outline:none;}
input:focus,select:focus{border-color:#3182F6 !important;box-shadow:0 0 0 3px rgba(49,130,246,0.12);}
a{transition:opacity .15s ease;}
a:hover{opacity:0.8;}

/* 부드러운 스크롤·선택 */
html{scroll-behavior:smooth;}
::selection{background:rgba(49,130,246,0.15);}

/* 모바일 최적화 */
@media (max-width: 640px){
  main{padding:16px 14px 40px !important;}
  h1{font-size:24px !important;}
  h2{font-size:19px !important;}
  /* 게이지·카드 flex를 세로로 */
  div[style*="flex-wrap: wrap"]{gap:12px !important;}
  /* 큰 숫자 축소 */
  span[style*="font-size: 42px"]{font-size:34px !important;}
  span[style*="font-size: 38px"]{font-size:30px !important;}
  span[style*="font-size: 28px"]{font-size:24px !important;}
  /* 터치 영역 확보: 버튼 최소 높이 */
  button{min-height:40px;}
  /* 표 가로 스크롤 */
  table{font-size:11px !important;}
  /* 패딩 큰 카드 축소 */
  div[style*="padding: 24px"]{padding:18px !important;}
}
@media (max-width: 400px){
  span[style*="font-size: 42px"]{font-size:30px !important;}
  h1{font-size:22px !important;}
}

@media print {
  .no-print{display:none !important;}
  *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;}
  body{background:#fff !important;}
  main{max-width:100% !important;padding:0 !important;}
  /* 카드가 페이지 중간에서 잘리지 않게 */
  div[style*="border-radius"]{break-inside:avoid;page-break-inside:avoid;}
  /* 빈 요소로 생기는 공백 제거 */
  div:empty{display:none !important;}
  /* 그림자는 인쇄 시 불필요 */
  div[style*="box-shadow"]{box-shadow:none !important;}
  @page{margin:12mm;}
}
